<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아카데미 강의장 안내 - 501호</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --point-red: #E60012; 
            --text-main: #000000;
            --text-sub: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #000; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 16:10 비율 유지 컨테이너 */
        #dashboard {
            width: 100vw;
            height: 62.5vw;
            max-height: 100vh;
            max-width: 160vh;
            background-color: #ffffff;
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
            transition: background-image 0.8s ease;
            /* 초기 로딩 시 기본 배경 */
            background-image: url('bg_common.png');
        }

        #active-state {
            width: 100%;
            height: 100%;
            position: relative;
            animation: fadeIn 1s ease;
        }

        /* 강의실 이름 (우측 상단) */
        .room-text {
            position: absolute;
            top: 5.5%;    
            right: 5%;    
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* 과정명 (중앙 우측) */
        .course-title-wrap {
            position: absolute;
            top: 50%;           
            right: 5%;          
            transform: translateY(-55%); 
            width: 45%;         
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
        }

        .course-title {
            font-size: 5.5rem; 
            font-weight: 900;
            color: var(--text-main);
            line-height: 1.3;
            word-break: keep-all;
            letter-spacing: -2px;
        }

        /* 교육 기간 (중앙 하단) */
        .period-pill {
            position: absolute;
            bottom: 12%;        
            left: 50%;          
            transform: translateX(-50%); 
            background-color: #F4F4F4;
            padding: 20px 60px;
            border-radius: 100px;
            /* JS에서 제어하기 위해 display 속성 기본값 유지 */
            display: inline-flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .period-label {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--point-red);
        }

        .period-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div id="active-state">
            <div class="room-text">501호</div>
            
            <div class="course-title-wrap">
                <h1 class="course-title" id="course-title">데이터 로딩중...</h1>
            </div>
            
            <div class="period-pill" id="period-pill">
                <span class="period-label">교육 기간</span>
                <span class="period-value" id="course-period">-</span>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub?gid=0&single=true&output=csv';

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); 
                
                let activeCourse = null;

                // 501호 데이터 검색
                for (let i = 0; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    const room = cols[2]?.trim();
                    
                    if (room === '501호' && cols[0]?.trim() !== '') {
                        activeCourse = {
                            title: cols[0]?.trim(),
                            period: cols[1]?.trim(),
                            brand: cols[5]?.trim() // 6가지 브랜드 구분값
                        };
                        break;
                    }
                }

                updateDashboard(activeCourse);

            } catch (error) {
                console.error('데이터 로드 오류:', error);
            }
        }

        function updateDashboard(course) {
            const dashboard = document.getElementById('dashboard');
            const courseTitle = document.getElementById('course-title');
            const coursePeriod = document.getElementById('course-period');
            const periodPill = document.getElementById('period-pill');

            // 1. 교육 과정이 없을 때 (매칭된 정보 없음)
            if (!course) {
                dashboard.style.backgroundImage = "url('bg_common.png')"; // 공통기타 배경
                courseTitle.innerHTML = '현재 진행중인<br>강의가 없습니다.'; // 안내 문구 출력 (가독성을 위해 줄바꿈 추가)
                periodPill.style.display = 'none'; // 하단 교육 기간 숨김
                return;
            }

            // 2. 교육 과정이 있을 때
            periodPill.style.display = 'inline-flex'; // 숨겨뒀던 교육 기간 다시 표시
            document.getElementById('course-title').innerHTML = course.title.replace(/\n/g, '<br>');
            document.getElementById('course-period').innerText = course.period || '-';

            // 3. 6가지 브랜드에 따른 통짜 배경 이미지 교체 로직
            switch(course.brand) {
                case '롯데리아':
                    dashboard.style.backgroundImage = "url('bg_lotteria.png')";
                    break;
                case '엔제리너스':
                    dashboard.style.backgroundImage = "url('bg_angelinus.png')";
                    break;
                case '스탠브루':
                    dashboard.style.backgroundImage = "url('bg_stanbru.png')";
                    break;
                case 'KKD':
                    dashboard.style.backgroundImage = "url('bg_kkd.png')";
                    break;
                case '플레이팅':
                    dashboard.style.backgroundImage = "url('bg_plating.png')";
                    break;
                case '공통기타':
                default:
                    dashboard.style.backgroundImage = "url('bg_common.png')"; 
                    break;
            }
        }

        // 초기 실행 및 30초마다 자동 갱신
        fetchSheetData();
        setInterval(fetchSheetData, 30000); 
    </script>
</body>
</html>
