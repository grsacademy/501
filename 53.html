<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아카데미 강의장 안내 - 503호</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --point-red: #E60012; 
            --text-main: #000000;
            --text-sub: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #000; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 16:10 비율 유지 컨테이너 */
        #dashboard {
            width: 100vw;
            height: 62.5vw;
            max-height: 100vh;
            max-width: 160vh;
            background-color: #ffffff;
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
            transition: background-image 0.8s ease;
            /* 초기 로딩 시 공통 배경 (.png 적용) */
            background-image: url('bg_common.png');
        }

        #active-state {
            width: 100%;
            height: 100%;
            position: relative;
            animation: fadeIn 1s ease;
        }

        /* 강의실 이름 (우측 상단) */
        .room-text {
            position: absolute;
            top: 3%;    
            right: 5%;    
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* 과정명 (중앙 우측) */
        .course-title-wrap {
            position: absolute;
            top: 50%;           
            right: 5%;          
            transform: translateY(-55%); 
            width: 45%;         
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
        }

        .course-title {
            font-size: 5.5rem; 
            font-weight: 900;
            color: var(--text-main);
            line-height: 1.3;
            word-break: keep-all;
            letter-spacing: -2px;
        }

        /* 교육 기간 (중앙 하단) */
        .period-pill {
            position: absolute;
            bottom: 12%;        
            left: 50%;          
            transform: translateX(-50%); 
            background-color: #F4F4F4;
            padding: 20px 60px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .period-label {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--point-red);
        }

        .period-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div id="active-state">
            <div class="room-text">503호</div>
            
            <div class="course-title-wrap">
                <h1 class="course-title" id="course-title">강의장 데이터 동기화 중...</h1>
            </div>
            
            <div class="period-pill" id="period-pill">
                <span class="period-label">교육 기간</span>
                <span class="period-value" id="course-period">-</span>
            </div>
        </div>
    </div>

    <script>
        // ★ 관리자 대시보드 및 로비 키오스크와 연동 중인 동일한 통합 구글 시트 ID 지정
        const SHEET_ID = '1T6gk3ediGcWimaS5EXVVxHnoqrW2aOdZJ5fGZVYVgLg';
        const TARGET_ROOM = '503호';

        // Gviz 날짜 데이터를 YYYY-MM-DD 형식의 문자열로 안전하게 파싱
        function parseGvizDate(cell) {
            if (!cell) return '';
            if (cell.f) {
                return String(cell.f).replace(/\./g, '-').replace(/\s/g, '').substring(0, 10);
            }
            if (cell.v) {
                const val = String(cell.v);
                if (val.startsWith('Date(')) {
                    const match = val.match(/Date\((\d+),(\d+),(\d+)/);
                    if (match) {
                        const y = match[1];
                        const m = String(parseInt(match[2]) + 1).padStart(2, '0');
                        const d = String(match[3]).padStart(2, '0');
                        return `${y}-${m}-${d}`;
                    }
                }
                return val.substring(0, 10);
            }
            return '';
        }

        // M월 D일(요일) 포맷으로 날짜 변환 헬퍼 함수
        function formatToCustomDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length < 3) return dateStr;
            const month = parseInt(parts[1], 10);
            const day = parseInt(parts[2], 10);
            const dateObj = new Date(dateStr);
            const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][dateObj.getDay()];
            return `${month}월 ${day}일(${dayOfWeek})`;
        }

        async function fetchSheetData() {
            try {
                // 브라우저 캐싱 방지를 위해 쿼리 URL 끝에 현재 타임스탬프 추가
                const targetUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=교육일정&t=${new Date().getTime()}`;
                const response = await fetch(targetUrl);
                const text = await response.text();
                
                // JSON 콜백 래퍼 파싱
                const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
                const data = JSON.parse(jsonStr);
                const rows = data.table.rows;

                // 타블렛 키오스크 조회 기준일(오늘 날짜: 2026-06-27) 생성
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const todayStr = `${y}-${m}-${d}`;
                
                let activeCourse = null;

                if (rows) {
                    for (let i = 0; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || !row.c) continue;

                        // 인덱스 기준: B(1) 과정명, C(2) 시작일, D(3) 종료일, G(6) 안내 층수, H(7) 배정 강의장, J(9) 브랜드 구분, K(10) 상태
                        const title = row.c[1] ? (row.c[1].v || row.c[1].f) : '';
                        const startDate = parseGvizDate(row.c[2]);
                        const endDate = parseGvizDate(row.c[3]);
                        const floorVal = row.c[6] ? (row.c[6].v || row.c[6].f) : '';
                        const roomVal = row.c[7] ? (row.c[7].v || row.c[7].f) : '';
                        const brand = row.c[9] ? (row.c[9].v || row.c[9].f) : '';
                        const status = row.c[10] ? (row.c[10].v || row.c[10].f) : '';

                        // 강의장명 공백 제거 예외처리 (예: "503호" 조합)
                        const fullRoom = String(floorVal).replace('층', 'F') + " " + String(roomVal);
                        const cleanRoom = fullRoom.replace(/\s+/g, '');

                        // ★ 예약 상태, 현재 503호 강의장 일치, 오늘 날짜가 교육 기간 내에 포함되는지 확인
                        if (status === '예약' && cleanRoom.includes(TARGET_ROOM.replace(/\s+/g, '')) && startDate <= todayStr && todayStr <= endDate) {
                            
                            const displayPeriod = `${formatToCustomDate(startDate)} - ${formatToCustomDate(endDate)}`;
                            
                            activeCourse = {
                                title: String(title),
                                period: displayPeriod,
                                brand: String(brand)
                            };
                            break;
                        }
                    }
                }

                updateDashboard(activeCourse);

            } catch (error) {
                console.error('데이터 로드 오류:', error);
                document.getElementById('course-title').innerHTML = '데이터를<br>불러올 수 없습니다';
            }
        }

        function updateDashboard(course) {
            const dashboard = document.getElementById('dashboard');
            const courseTitle = document.getElementById('course-title');
            const periodPill = document.getElementById('period-pill');

            // 1. 매칭된 정보가 없을 때 (기본형 .png 파일 적용)
            if (!course) {
                dashboard.style.backgroundImage = "url('bg_common.png')"; 
                courseTitle.innerHTML = '현재 진행중인<br>강의가 없습니다'; 
                periodPill.style.display = 'none'; 
                return;
            }

            // 2. 정보가 있을 때 텍스트 반영
            periodPill.style.display = 'inline-flex'; 
            courseTitle.innerHTML = course.title.replace(/\\n|\n/g, '<br>');
            document.getElementById('course-period').innerText = course.period || '-';

            // 3. 6가지 브랜드 이미지 분기 처리 (.png 파일 적용)
            switch(course.brand) {
                case '롯데리아':
                    dashboard.style.backgroundImage = "url('bg_lotteria.png')";
                    break;
                case '엔제리너스':
                    dashboard.style.backgroundImage = "url('bg_angelinus.png')";
                    break;
                case '스탠브루':
                    dashboard.style.backgroundImage = "url('bg_stanbru.png')";
                    break;
                case 'KKD':
                    dashboard.style.backgroundImage = "url('bg_kkd.png')";
                    break;
                case '플레이팅':
                    dashboard.style.backgroundImage = "url('bg_plating.png')";
                    break;
                case '통합/기타':
                default:
                    dashboard.style.backgroundImage = "url('bg_common.png')"; 
                    break;
            }
        }

        // 초기 실행 및 30초 단위 시트 동기화 갱신 설정
        fetchSheetData();
        setInterval(fetchSheetData, 30000); 
    </script>
</body>
</html>
