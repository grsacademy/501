<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아카데미 강의장 안내 - 602호</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --point-red: #E60012; 
            --text-main: #000000;
            --text-sub: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: #000; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 16:10 비율 유지 컨테이너 */
        #dashboard {
            width: 100vw;
            height: 62.5vw;
            max-height: 100vh;
            max-width: 160vh;
            background-color: #ffffff;
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
            transition: background-image 0.8s ease;
            /* 초기 로딩 시 공통 배경 (.png 적용) */
            background-image: url('bg_common.png');
        }

        #active-state {
            width: 100%;
            height: 100%;
            position: relative;
            animation: fadeIn 1s ease;
        }

        /* 강의실 이름 (우측 상단) */
        .room-text {
            position: absolute;
            top: 3%;    
            right: 5%;    
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* 과정명 (중앙 우측) */
        .course-title-wrap {
            position: absolute;
            top: 50%;           
            right: 5%;          
            transform: translateY(-55%); 
            width: 45%;         
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
        }

        .course-title {
            font-size: 5.5rem; 
            font-weight: 900;
            color: var(--text-main);
            line-height: 1.3;
            word-break: keep-all;
            letter-spacing: -2px;
        }

        /* 교육 기간 (중앙 하단) */
        .period-pill {
            position: absolute;
            bottom: 12%;        
            left: 50%;          
            transform: translateX(-50%); 
            background-color: #F4F4F4;
            padding: 20px 60px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .period-label {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--point-red);
        }

        .period-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div id="active-state">
            <div class="room-text">602호</div>
            
            <div class="course-title-wrap">
                <h1 class="course-title" id="course-title">데이터 로딩중...</h1>
            </div>
            
            <div class="period-pill" id="period-pill">
                <span class="period-label">교육 기간</span>
                <span class="period-value" id="course-period">-</span>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThSEdRPQ80O2WMC8E-ceES--tvUAIVPlIR4_gmRq2Uoix8CxKqU3WQSkh5O3bKPI4tU56jqMXPKQcn/pub?gid=1863328310&single=true&output=csv';

        async function fetchSheetData() {
            try {
                // 브라우저 캐싱(과거 데이터 유지) 방지를 위해 URL 끝에 현재 시간 추가
                const fetchUrl = SHEET_URL + '&t=' + new Date().getTime();
                const response = await fetch(fetchUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); 
                
                let activeCourse = null;

                for (let i = 0; i < rows.length; i++) {
                    if (!rows[i].trim()) continue; // 빈 줄 무시

                    // CSV 분리 (셀 안에 쉼표가 있을 경우 보호)
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => {
                        return col ? col.replace(/^"|"$/g, '').trim() : ''; // 양끝 따옴표 제거
                    });

                    // 강의장 호수 공백 모두 제거 (예: ' 601 호 ' -> '601호')
                    const room = cols[2] ? cols[2].replace(/\s+/g, '') : '';
                    
                    if (room === '602호' && cols[0] !== '') {
                        activeCourse = {
                            title: cols[0],
                            period: cols[1],
                            brand: cols[5] // 6가지 브랜드 구분값
                        };
                        break;
                    }
                }

                updateDashboard(activeCourse);

            } catch (error) {
                console.error('데이터 로드 오류:', error);
                document.getElementById('course-title').innerHTML = '데이터를<br>불러올 수 없습니다';
            }
        }

        function updateDashboard(course) {
            const dashboard = document.getElementById('dashboard');
            const courseTitle = document.getElementById('course-title');
            const periodPill = document.getElementById('period-pill');

            // 1. 매칭된 정보가 없을 때 (.png 파일 적용)
            if (!course) {
                dashboard.style.backgroundImage = "url('bg_common.png')"; 
                courseTitle.innerHTML = '현재 진행중인<br>강의가 없습니다'; 
                periodPill.style.display = 'none'; 
                return;
            }

            // 2. 정보가 있을 때 텍스트 반영
            periodPill.style.display = 'inline-flex'; 
            courseTitle.innerHTML = course.title.replace(/\\n|\n/g, '<br>');
            document.getElementById('course-period').innerText = course.period || '-';

            // 3. 6가지 브랜드 이미지 분기 처리 (.png 파일 적용)
            switch(course.brand) {
                case '롯데리아':
                    dashboard.style.backgroundImage = "url('bg_lotteria.png')";
                    break;
                case '엔제리너스':
                    dashboard.style.backgroundImage = "url('bg_angelinus.png')";
                    break;
                case '스탠브루':
                    dashboard.style.backgroundImage = "url('bg_stanbru.png')";
                    break;
                case 'KKD':
                    dashboard.style.backgroundImage = "url('bg_kkd.png')";
                    break;
                case '플레이팅':
                    dashboard.style.backgroundImage = "url('bg_plating.png')";
                    break;
                case '공통기타':
                default:
                    dashboard.style.backgroundImage = "url('bg_common.png')"; 
                    break;
            }
        }

        // 초기 실행 및 30초마다 갱신
        fetchSheetData();
        setInterval(fetchSheetData, 30000); 
    </script>
</body>
</html>
